<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match 3</title>
  <style>
    :root { --g: 58px; --gap: 5px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: system-ui, sans-serif;
      color: #fff;
      user-select: none;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: calc(8 * var(--g) + 7 * var(--gap) + 20px);
    }

    h1 { font-size: 20px; letter-spacing: 3px; color: #a29bfe; font-weight: 900; }

    #score { font-size: 20px; font-weight: 700; }

    button {
      background: #6c5ce7;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: background .15s;
    }
    button:hover { background: #a29bfe; }

    #board-wrap {
      padding: 10px;
      background: #16213e;
      border-radius: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,.65);
      position: relative;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, var(--g));
      gap: var(--gap);
    }

    .cell {
      width: var(--g);
      height: var(--g);
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: transform .12s, filter .12s;
      overflow: hidden;
    }

    /* shine overlay */
    .cell::after {
      content: '';
      position: absolute;
      top: 4px; left: 9px;
      width: 36%; height: 26%;
      background: rgba(255,255,255,.30);
      border-radius: 50%;
      filter: blur(3px);
      pointer-events: none;
    }

    .cell:hover { transform: scale(1.07); }
    .cell.selected {
      transform: scale(1.12);
      filter: brightness(1.35);
      box-shadow: 0 0 0 3px #fff, 0 0 18px rgba(255,255,255,.45);
      z-index: 5;
    }
    .cell.spawn { animation: drop var(--dur, 260ms) ease-in both; }
    @keyframes drop {
      from { transform: translateY(var(--sy, -63px)); opacity: 0.15; }
      to   { transform: translateY(0); opacity: 1; }
    }
    /* matched must come AFTER spawn so it wins when both classes are present */
    .cell.matched { animation: pop .32s ease-out forwards; }
    @keyframes pop {
      0%   { transform: scale(1);    opacity: 1; }
      45%  { transform: scale(1.3);  opacity: .8; }
      100% { transform: scale(0);    opacity: 0; }
    }

    /* 6 gem types */
    .t0 { background: linear-gradient(145deg, #ff7675, #d63031); }
    .t1 { background: linear-gradient(145deg, #74b9ff, #0070cc); }
    .t2 { background: linear-gradient(145deg, #55efc4, #00b894); }
    .t3 { background: linear-gradient(145deg, #ffd166, #f0a500); }
    .t4 { background: linear-gradient(145deg, #c39bd3, #8e44ad); }
    .t5 { background: linear-gradient(145deg, #fd79a8, #e84393); }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 2px 16px rgba(0,0,0,.8);
      pointer-events: none;
      opacity: 0;
      border-radius: 18px;
    }
    .pop-msg { animation: msgAnim .85s ease-out forwards; }
    @keyframes msgAnim {
      0%   { opacity: 0; transform: scale(.5); }
      25%  { opacity: 1; transform: scale(1.15); }
      65%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(.85); }
    }
  </style>
</head>
<body>

<header>
  <h1>MATCH 3</h1>
  <div id="score">Score: <span id="sv">0</span></div>
  <button onclick="init()">New Game</button>
  <button id="bot-btn" onclick="toggleBot()">▶ Bot</button>
</header>

<div id="board-wrap">
  <div id="board"></div>
  <div id="overlay"></div>
</div>

<script>
const R = 8, C = 8, T = 6;
let board, sel, score, busy;
const rnd = () => Math.floor(Math.random() * T);
const delay = ms => new Promise(res => setTimeout(res, ms));

// ── audio ────────────────────────────────────────────────────────────────────

const AC = new (window.AudioContext || window.webkitAudioContext)();

function beep({ freq = 440, type = 'sine', gain = 0.25, attack = 0.01, decay = 0.12 } = {}) {
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.connect(g); g.connect(AC.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(gain, AC.currentTime + attack);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + attack + decay);
  osc.start(AC.currentTime);
  osc.stop(AC.currentTime + attack + decay + 0.01);
}

const sfx = {
  select  : () => beep({ freq: 660,  type: 'sine',     gain: 0.15, decay: 0.08 }),
  swap    : () => beep({ freq: 520,  type: 'triangle', gain: 0.2,  decay: 0.1  }),
  invalid : () => beep({ freq: 160,  type: 'sawtooth', gain: 0.18, decay: 0.09 }),
  match   : (combo) => {
    const notes = [523, 659, 784, 1047];
    notes.slice(0, Math.min(combo + 1, 4)).forEach((f, i) =>
      setTimeout(() => beep({ freq: f, type: 'sine', gain: 0.22, decay: 0.15 }), i * 60)
    );
  },
  drop    : () => beep({ freq: 300,  type: 'sine',     gain: 0.1,  attack: 0.005, decay: 0.06 }),
  shuffle : () => {
    [200, 280, 360, 440, 540].forEach((f, i) =>
      setTimeout(() => beep({ freq: f, type: 'triangle', gain: 0.15, decay: 0.1 }), i * 70)
    );
  },
};

// ── init ────────────────────────────────────────────────────────────────────

function init() {
  botActive = false;
  const bb = document.getElementById('bot-btn');
  if (bb) { bb.textContent = '▶ Bot'; bb.style.background = ''; }
  board = Array.from({length: R}, () => Array.from({length: C}, rnd));
  sel = null; score = 0; busy = false;
  resolveMatches();
  document.getElementById('sv').textContent = 0;
  render();
}

function resolveMatches() {
  for (let pass = 0; pass < 20; pass++) {
    const m = findMatches(); let any = false;
    for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) if (m[r][c]) { board[r][c] = rnd(); any = true; }
    if (!any) break;
  }
}

// ── match logic ─────────────────────────────────────────────────────────────

function findMatches() {
  const m = Array.from({length: R}, () => Array(C).fill(false));
  // horizontal
  for (let r = 0; r < R; r++)
    for (let c = 0; c <= C - 3; c++) {
      const v = board[r][c];
      if (v === board[r][c+1] && v === board[r][c+2]) {
        m[r][c] = m[r][c+1] = m[r][c+2] = true;
        let k = c+3; while (k < C && board[r][k] === v) m[r][k++] = true;
      }
    }
  // vertical
  for (let c = 0; c < C; c++)
    for (let r = 0; r <= R - 3; r++) {
      const v = board[r][c];
      if (v === board[r+1][c] && v === board[r+2][c]) {
        m[r][c] = m[r+1][c] = m[r+2][c] = true;
        let k = r+3; while (k < R && board[k][c] === v) m[k++][c] = true;
      }
    }
  return m;
}

function countM(m) {
  let n = 0;
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) if (m[r][c]) n++;
  return n;
}

// Returns fd[r][c] = rows fallen (0 = didn't move); also fills new gems in-place
function gravity() {
  const fd = Array.from({length: R}, () => Array(C).fill(0));
  for (let c = 0; c < C; c++) {
    const col = [];
    for (let r = R-1; r >= 0; r--) if (board[r][c] !== null) col.push({v: board[r][c], origR: r});
    const nNew = R - col.length;
    for (let r = R-1; r >= 0; r--) {
      if (col.length) {
        const {v, origR} = col.shift();
        board[r][c] = v;
        fd[r][c] = r - origR;        // existing gem: how many rows it fell
      } else {
        board[r][c] = rnd();          // new gem from outside
        fd[r][c] = nNew;              // falls nNew rows (same as every other new gem in column)
      }
    }
  }
  return fd;
}

function hasMove() {
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
    if (c < C-1) {
      [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
      const ok = countM(findMatches()) > 0;
      [board[r][c], board[r][c+1]] = [board[r][c+1], board[r][c]];
      if (ok) return true;
    }
    if (r < R-1) {
      [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
      const ok = countM(findMatches()) > 0;
      [board[r][c], board[r+1][c]] = [board[r+1][c], board[r][c]];
      if (ok) return true;
    }
  }
  return false;
}

function shuffleBoard() {
  const flat = board.flat();
  for (let i = flat.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }
  board = Array.from({length: R}, (_, r) => flat.slice(r*C, (r+1)*C));
  resolveMatches();
}

// ── render ───────────────────────────────────────────────────────────────────

// fd: 2D fall-distance array from gravity(), or null for no animation
function render(fd = null) {
  const el = document.getElementById('board');
  el.innerHTML = '';
  const G = 63; // --g (58px) + --gap (5px)
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
    const div = document.createElement('div');
    div.className = `cell t${board[r][c]}`;
    if (sel?.[0] === r && sel?.[1] === c) div.classList.add('selected');
    const d = fd?.[r]?.[c] ?? 0;
    if (d > 0) {
      div.classList.add('spawn');
      div.style.setProperty('--sy',  `-${d * G}px`);
      div.style.setProperty('--dur', `${Math.round(130 * Math.sqrt(d))}ms`);
      div.style.animationDelay = `${(R - 1 - r) * 15}ms`; // bottom lands first
    }
    div.dataset.r = r; div.dataset.c = c;
    div.addEventListener('click', onCell);
    el.appendChild(div);
  }
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function flash(txt) {
  const el = document.getElementById('overlay');
  el.textContent = txt;
  el.className = 'pop-msg';
  el.addEventListener('animationend', () => { el.className = ''; }, {once: true});
}

// ── input ────────────────────────────────────────────────────────────────────

function onCell(e) {
  if (AC.state === 'suspended') AC.resume();
  if (busy) return;
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (!sel) { sel = [r, c]; sfx.select(); render(); return; }
  const [sr, sc] = sel;
  if (sr === r && sc === c) { sel = null; render(); return; }
  if (Math.abs(sr-r) + Math.abs(sc-c) !== 1) { sel = [r, c]; sfx.select(); render(); return; }
  sel = null;
  sfx.swap();
  doSwap(sr, sc, r, c);
}

// ── game loop ─────────────────────────────────────────────────────────────────

async function doSwap(r1, c1, r2, c2) {
  busy = true;
  const G = 63, tr = 'transform 0.17s cubic-bezier(.4,0,.2,1)';
  const dx = (c2 - c1) * G, dy = (r2 - r1) * G;

  // check validity BEFORE animating so we know which path to take
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  const valid = countM(findMatches()) > 0;
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]]; // restore

  const g1 = cellEl(r1, c1), g2 = cellEl(r2, c2);

  // animate forward
  g1.style.zIndex = g2.style.zIndex = '10';
  g1.style.transition = g2.style.transition = tr;
  void g1.offsetWidth;
  g1.style.transform = `translate(${dx}px,${dy}px)`;
  g2.style.transform = `translate(${-dx}px,${-dy}px)`;
  await delay(185);

  if (!valid) {
    sfx.invalid();
    g1.style.transform = 'translate(0,0)';
    g2.style.transform = 'translate(0,0)';
    await delay(185);
    render();
    busy = false;
    return;
  }

  // commit swap, rebuild DOM, cascade
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  render();

  let combo = 0, pts = 0;

  while (true) {
    const m = findMatches();
    const cnt = countM(m);
    if (cnt === 0) break;

    combo++;
    pts += cnt * 10 * combo;
    sfx.match(combo);

    // animate matched cells
    for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) if (m[r][c]) cellEl(r, c)?.classList.add('matched');
    await delay(340);

    // clear matched, apply gravity + fill, animate
    for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) if (m[r][c]) board[r][c] = null;
    const fd = gravity();
    sfx.drop();
    render(fd);
    await delay(500);
  }

  score += pts;
  document.getElementById('sv').textContent = score;
  if (combo > 1) flash(`COMBO ×${combo}!`);

  if (!hasMove()) {
    flash('SHUFFLING!');
    sfx.shuffle();
    await delay(700);
    shuffleBoard();
    // uniform 1-row drop for shuffle
    const sfd = Array.from({length: R}, () => Array(C).fill(1));
    render(sfd);
    await delay(300);
  }

  busy = false;
}

// ── bot ──────────────────────────────────────────────────────────────────────

let botActive = false;

// Returns the highest-scoring swap, or null if none exists.
// Scores = number of matched cells after the swap.
// Among equal scores, picks randomly to add variety.
function findBestMove() {
  let best = [], bestScore = 0;
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      for (const [r2, c2] of [[r, c + 1], [r + 1, c]]) {
        if (r2 >= R || c2 >= C) continue;
        [board[r][c], board[r2][c2]] = [board[r2][c2], board[r][c]];
        const s = countM(findMatches());
        [board[r][c], board[r2][c2]] = [board[r2][c2], board[r][c]];
        if (s > bestScore)      { bestScore = s; best = [{r1:r,c1:c,r2,c2}]; }
        else if (s === bestScore && s > 0) best.push({r1:r,c1:c,r2,c2});
      }
    }
  }
  return best.length ? best[Math.floor(Math.random() * best.length)] : null;
}

async function botLoop() {
  while (botActive) {
    while (busy) await delay(50);       // wait for any ongoing animation
    if (!botActive) break;

    const move = findBestMove();
    if (!move) { await delay(400); continue; } // no valid move → wait for shuffle

    // briefly highlight chosen gem so the player can see the intent
    sel = [move.r1, move.c1];
    render();
    await delay(0);
    if (!botActive) { sel = null; render(); break; }
    sel = null;

    doSwap(move.r1, move.c1, move.r2, move.c2);
    await delay(0);                    // let doSwap set busy = true
    while (busy) await delay(50);
    await delay(0);                   // breathing room between moves
  }
}

function toggleBot() {
  botActive = !botActive;
  const btn = document.getElementById('bot-btn');
  btn.textContent    = botActive ? '■ Stop' : '▶ Bot';
  btn.style.background = botActive ? '#e84393' : '';
  if (botActive) botLoop();
}

init();
</script>
</body>
</html>
